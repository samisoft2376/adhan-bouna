<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أذان بونة Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --main-teal: #00695c; --accent-gold: #ffcf33; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Cairo', sans-serif; background: #000; color: white; }
        #dynamic-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-size: cover; background-position: center; filter: brightness(0.3); transition: 2s; }
        .app-container { height: 100%; display: flex; flex-direction: column; backdrop-filter: blur(8px); }
        header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .live-clock { font-size: 3rem; font-weight: bold; color: white; margin: 10px 0; }
        .prayer-card { display: flex; justify-content: space-between; padding: 15px; margin: 10px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .prayer-card.active { border-color: var(--accent-gold); background: var(--main-teal); }
        .hadith-ticker { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 10px; overflow: hidden; white-space: nowrap; border-top: 1px solid var(--accent-gold); }
        .hadith-ticker span { display: inline-block; animation: ticker 20s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .error-msg { color: #ff5252; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="dynamic-bg"></div>
    <div class="app-container">
        <header>
            <div id="loc-name">مسجد النور - عنابة</div>
            <div class="live-clock" id="liveClock">00:00:00</div>
            <div id="hijri-date" style="color: var(--accent-gold);">جارٍ التحميل...</div>
        </header>
        <div id="prayer-list" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div class="hadith-ticker"><span id="hadith-text">جارٍ تحميل أحاديث اليوم...</span></div>
    </div>

    <script>
        // 1. البيانات الأساسية
        const dailyHadiths = ["«مَنْ صَلَّى الْبَرْدَيْنِ دَخَلَ الْجَنَّةَ»", "«رَكْعَتَا الْفَجْرِ خَيْرٌ مِنَ الدُّنْيَا وَمَا فِيهَا»", "«أَحَبُّ الأَعْمَالِ إِلَى اللَّهِ أَدْوَمُهَا وَإِنْ قَلَّ»"];
        const prayersData = [{id:"Fajr", name:"الفجر"}, {id:"Dhuhr", name:"الظهر"}, {id:"Asr", name:"العصر"}, {id:"Maghrib", name:"المغرب"}, {id:"Isha", name:"العشاء"}];
        let pTimes = {};

        // 2. محرك التشغيل الرئيسي (معدل ليعمل فوراً)
        function init() {
            updateClock(); 
            setInterval(updateClock, 1000); // تشغيل الساعة فوراً
            setHadith();
            fetchData();
            setInterval(fetchData, 3600000); // تحديث البيانات كل ساعة
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString('en-GB');
            if(pTimes.Fajr) checkActivePrayer(now);
        }

        async function fetchData() {
            try {
                const response = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Annaba&country=Algeria&method=3');
                const data = await response.json();
                if(data.code === 200) {
                    pTimes = data.data.timings;
                    document.getElementById('hijri-date').innerText = data.data.date.hijri.day + " " + data.data.date.hijri.month.ar + " " + data.data.date.hijri.year + " هـ";
                    renderPrayers();
                }
            } catch (error) {
                console.error("خطأ في جلب البيانات", error);
                document.getElementById('hijri-date').innerText = "خطأ في الاتصال بالإنترنت";
            }
        }

        function renderPrayers() {
            const container = document.getElementById('prayer-list');
            container.innerHTML = '';
            prayersData.forEach(p => {
                container.innerHTML += `
                    <div class="prayer-card" id="card-${p.id}">
                        <span>${p.name}</span>
                        <span style="color:var(--accent-gold); font-weight:bold;">${pTimes[p.id]}</span>
                    </div>`;
            });
        }

        function checkActivePrayer(now) {
            prayersData.forEach(p => {
                const card = document.getElementById(`card-${p.id}`);
                if(!card) return;
                const [h, m] = pTimes[p.id].split(':');
                const pDate = new Date(); pDate.setHours(h, m, 0);
                if (now >= pDate) {
                    card.style.opacity = "0.5";
                    card.classList.remove('active');
                }
            });
        }

        function setHadith() {
            document.getElementById('hadith-text').innerText = dailyHadiths[new Date().getDay() % dailyHadiths.length];
        }

        // تشغيل التطبيق
        init();
    </script>
</body>
</html>
