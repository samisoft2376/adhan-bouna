<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أذان بونة Pro - Kherrachi Sami</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#004d40">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Adhan Bouna">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/192/ffffff/crescent-moon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --teal-deep: #004d40;
            --main-teal: #00695c;
            --accent-gold: #ffcf33;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --bg-gradient: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #004d40);
            --metallic-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        .state-near { --teal-deep: #b38728; --main-teal: #d4a017; } 
        .state-urgent { --teal-deep: #832b13; --main-teal: #a04000; } 

        * { box-sizing: border-box; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            padding: 15px;
            color: #333;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.4);
            text-align: center;
        }

        header {
            background: linear-gradient(to bottom, var(--teal-deep), var(--main-teal));
            color: white;
            padding: 30px 15px 25px;
        }

        .logo-title { 
            font-size: 2rem; 
            font-weight: 900; 
            margin: 0 0 15px; 
            letter-spacing: -1px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* --- تصميم الإطار المدمج الجديد (Premium Frame) --- */
        .premium-frame {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 25px;
            padding: 20px 15px;
            margin: 0 10px 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }

        /* الجزء العلوي من الإطار: الهوية */
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        /* اللوغو الرمزي داخل الإطار */
        .brand-logo {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--metallic-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .brand-logo::before {
            content: '';
            position: absolute;
            width: 140%;
            height: 140%;
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.1), rgba(255,255,255,0.1) 2px, transparent 2px, transparent 6px);
            opacity: 0.3;
            animation: swirl 10s linear infinite;
        }

        @keyframes swirl { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .brand-logo .logo-char {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            z-index: 1;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            margin-top: -2px;
        }

        /* الاسم واللقب داخل الإطار */
        .designer-tag {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: var(--metallic-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.1);
            text-align: left;
        }

        /* خط فاصل أنيق */
        .frame-divider {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            margin: 0 0 15px;
        }

        /* الجزء السفلي من الإطار: الساعة */
        .clock-display {
            text-align: center;
        }

        .live-clock {
            font-size: 3.2rem; 
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            line-height: 1.1;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .current-date {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 5px;
            font-weight: 500;
        }

        /* -------------------------------------- */

        .countdown-card {
            background: rgba(255,255,255,0.12);
            margin: 0 30px;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #timer { font-size: 1.6rem; font-weight: bold; color: var(--accent-gold); }

        .dua-section {
            background: #f8f9fa;
            margin: 20px 25px;
            padding: 15px;
            border-radius: 15px;
            font-weight: 600;
            color: var(--teal-deep);
            border-left: 4px solid var(--accent-gold);
            font-size: 0.95rem;
            min-height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .prayer-list { padding: 0 25px 25px; }

        .prayer-card {
            display: flex;
            justify-content: space-between;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid transparent;
        }

        .prayer-card.active {
            border-color: var(--teal-deep);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .p-name { font-weight: 700; color: #333; }
        .p-time { font-weight: 800; color: var(--teal-deep); }

        .btn-adhan {
            width: calc(100% - 50px);
            margin: 0 25px 30px;
            padding: 18px;
            border: none;
            border-radius: 50px;
            background-color: var(--teal-deep);
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,77,64,0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-active { background: #c0392b !important; }

        @media (max-width: 380px) {
            .logo-title { font-size: 1.8rem; }
            .live-clock { font-size: 2.6rem; }
            #timer { font-size: 1.4rem; }
            .designer-tag { font-size: 0.85rem; }
            .brand-logo { width: 38px; height: 38px; }
            .brand-logo .logo-char { font-size: 1.4rem; }
            .premium-frame { padding: 15px 10px; }
        }
    </style>
</head>
<body id="mainBody">

    <main class="app-container">
        <header id="appHeader">
            <h1 class="logo-title">أذان بونة</h1>
            
            <div class="premium-frame">
                
                <div class="brand-header">
                    <div class="brand-logo">
                        <span class="logo-char">K</span>
                    </div>
                    <div class="designer-tag">Kherrachi Sami</div>
                </div>
                
                <hr class="frame-divider">
                
                <div class="clock-display">
                    <div class="live-clock" id="liveClock">00:00:00</div>
                    <div class="current-date" id="currentDate">--</div>
                </div>
                
            </div>
            
            <div class="countdown-card">
                <span style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;">الصلاة القادمة</span>
                <div id="timer">00:00:00</div>
            </div>
        </header>

        <section class="dua-section" id="dua-text">أستغفر الله العظيم وأتوب إليه</section>

        <section class="prayer-list">
            <div class="prayer-card" id="fajr"><span class="p-name">الفجر</span><span class="p-time">05:21</span></div>
            <div class="prayer-card" style="color:#b38728" id="sunrise"><span class="p-name">الشروق ☀️</span><span class="p-time">06:48</span></div>
            <div class="prayer-card" id="dhuhr"><span class="p-name">الظهر</span><span class="p-time">12:38</span></div>
            <div class="prayer-card" id="asr"><span class="p-name">العصر</span><span class="p-time">15:55</span></div>
            <div class="prayer-card" id="maghrib"><span class="p-name">المغرب</span><span class="p-time">18:26</span></div>
            <div class="prayer-card" id="isha"><span class="p-name">العشاء</span><span class="p-time">19:46</span></div>
        </section>

        <button class="btn-adhan" id="audioToggle" aria-label="تفعيل الأذان">🔔 تفعيل الأذان</button>
    </main>

    <audio id="adhanSound" src="adhan.mp3" preload="none"></audio>

    <script>
        // تسجيل Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Error:', err));
            });
        }

        let prayers = [
            { id: 'fajr', name: 'الفجر', time: '05:21', adhan: true },
            { id: 'sunrise', name: 'الشروق', time: '06:48', adhan: false },
            { id: 'dhuhr', name: 'الظهر', time: '12:38', adhan: true },
            { id: 'asr', name: 'العصر', time: '15:55', adhan: true },
            { id: 'maghrib', name: 'المغرب', time: '18:26', adhan: true },
            { id: 'isha', name: 'العشاء', time: '19:46', adhan: true }
        ];

        const duas = ["اللهم إنك عفو تحب العفو فاعفُ عنا", "سبحان الله وبحمده", "لا إله إلا أنت سبحانك", "اللهم صلِّ على محمد"];
        
        function fetchTimes(lat, lng) {
            fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=3`)
            .then(r => r.json()).then(d => {
                const t = d.data.timings;
                const mapping = {fajr: t.Fajr, sunrise: t.Sunrise, dhuhr: t.Dhuhr, asr: t.Asr, maghrib: t.Maghrib, isha: t.Isha};
                prayers.forEach(p => {
                    p.time = mapping[p.id];
                    document.querySelector(`#${p.id} .p-time`).innerText = p.time;
                });
            }).catch(e => console.log("Offline mode active"));
        }

        navigator.geolocation.getCurrentPosition(p => fetchTimes(p.coords.latitude, p.coords.longitude));

        let adhanEnabled = false;
        const adhan = document.getElementById('adhanSound');
        const toggleBtn = document.getElementById('audioToggle');

        toggleBtn.onclick = function() {
            adhanEnabled = !adhanEnabled;
            this.classList.toggle('btn-active');
            this.innerHTML = adhanEnabled ? "🔕 إيقاف التنبيه" : "🔔 تفعيل الأذان";
            if(adhanEnabled) { adhan.play().then(()=> { adhan.pause(); adhan.currentTime=0; }).catch(e => console.log("Audio prevented")); }
        };

        function update() {
            const now = new Date();
            const nowStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
            const sec = now.getSeconds();
            
            // تحديث الساعة
            document.getElementById('liveClock').innerText = now.toLocaleTimeString('ar-DZ');
            
            // تحديث التاريخ (إضافة جديدة للإطار)
            const dateOptions = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').innerText = now.toLocaleDateString('ar-DZ', dateOptions);

            if (sec === 0) {
                document.getElementById('dua-text').innerText = duas[Math.floor(Math.random() * duas.length)];
            }

            let nextP = null;
            prayers.forEach(p => {
                const card = document.getElementById(p.id);
                if (nowStr >= p.time) card.classList.add('active');
                else {
                    card.classList.remove('active');
                    if (!nextP) nextP = p;
                }
                if (adhanEnabled && p.adhan && nowStr === p.time && sec === 0) adhan.play().catch(e => console.log("Audio prevented"));
            });

            if (!nextP) nextP = prayers[0];

            const target = new Date();
            const [th, tm] = nextP.time.split(':');
            target.setHours(th, tm, 0);
            if (target < now) target.setDate(target.getDate() + 1);
            
            const diffMin = Math.floor((target - now) / 60000);
            
            const container = document.body;
            container.classList.remove('state-near', 'state-urgent');
            if (diffMin < 5) container.classList.add('state-urgent');
            else if (diffMin < 30) container.classList.add('state-near');

            const diff = target - now;
            const hh = Math.floor(diff/3600000).toString().padStart(2,'0');
            const mm = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
            const ss = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${hh}:${mm}:${ss}`;
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
